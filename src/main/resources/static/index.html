<!DOCTYPE html>
<meta charset="UTF-8">
<html>
<head>
    <title>AI 聊天助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-left">
            <h1>AI 聊天助手</h1>
            <div class="student-info">
                <p>个人学号</p>
            </div>
        </div>
        <div class="header-right">
            <div class="model-selection-inline">
                <label for="model">🤖 模型：</label>
                <select id="model" class="model-select-inline" onchange="updateModelValue(this.value)">
                    <option value="qwen-plus" selected>Qwen Plus</option>
                    <option value="qwen-max">Qwen Max</option>
                    <option value="qwen-turbo">Qwen Turbo</option>
                    <option value="deepseek-v3">DeepSeek V3</option>
                </select>
            </div>
        </div>
    </div>

    <div id="chatbox"></div>

    <div class="input-area">
        <textarea id="input" placeholder="请输入您的问题..." rows="3"></textarea>
        <button onclick="send()">发送</button>
    </div>

    <div class="bottom-bar">
        <div class="action-buttons-left">
            <button onclick="clearChat()" class="clear-btn">🗑️ 清除记录</button>
        </div>
        
        <div class="temperature-control-inline">
            <label for="temp">🌡️ 温度：<span id="tempValue">0.5</span></label>
            <input type="range" min="0" max="1" step="0.1" id="temp" value="0.5" class="temp-slider-inline" oninput="updateTempValue(this.value)">
            <p class="temp-hint-text">💡 值越低越严谨，值越高越有创造力</p>
        </div>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
